# gmoney-basket-builder profile
#
# Refinement knobs for this skill. Hermes does not currently apply per-skill
# overrides natively — see scripts/install.py and README "Profiles" for how
# this is consumed today. Treat each value as the recommended setting when
# the orchestrator hands control to this role.

role: orchestrator
model: anthropic/claude-sonnet-4.6
provider: openrouter
reasoning_effort: medium
max_tokens: 4096
toolsets: [skills, web, todo, gbrain]
notes: |
  Sequencing and hand-off — not deep reasoning. The five sub-skills do
  the analytical work; this skill loads them, hands them the canonical
  thesis, and stitches the outputs together. Sonnet is the cost-efficient
  choice. Needs the `skills` toolset to invoke sub-skills, `todo` for
  pipeline tracking, `web` only if a sub-skill defers a lookup to it, and
  `gbrain` to persist each phase's artifact to the brain (see
  docs/gbrain/wiring.md).
