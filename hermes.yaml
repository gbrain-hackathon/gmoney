# gmoney — Hermes skill bundle manifest
#
# This file is the canonical description of the gmoney bundle for any tool
# that wants to install or inspect it. It is NOT read by Hermes itself
# (Hermes only knows about `skills.external_dirs` in its own config). The
# install script in scripts/install.py reads this file and applies the
# external_dirs entry to a target Hermes config.yaml.

name: gmoney
version: 0.1.0
description: |
  Multi-agent investment-thesis analysis. Analyst, quant, and macro
  researchers feed a portfolio manager that builds a basket; a risk
  officer red-teams it. gmoney-basket-builder is the orchestrator that
  drives the full pipeline end-to-end.

# Where the skill bundles live, relative to the repository root. This is
# the path that should be added to Hermes' skills.external_dirs.
skills_root: skills/gmoney

# Pipeline order, for documentation. gmoney-basket-builder is the entrypoint
# the agent should load first when a thesis arrives.
pipeline:
  - gmoney-basket-builder
  - gmoney-analyst
  - gmoney-quant
  - gmoney-macro
  - gmoney-pm
  - gmoney-risk

# Per-skill descriptors. Each entry points to the skill directory and its
# profile sidecar. Profiles capture refinement knobs (model, reasoning
# effort, max tokens, toolsets) that are not yet natively per-skill in
# Hermes — they document intent and can be applied manually or by a future
# bootstrap that Hermes itself supports.
skills:
  gmoney-basket-builder:
    path: skills/gmoney/gmoney-basket-builder
    profile: skills/gmoney/gmoney-basket-builder/profile.yaml
    role: orchestrator
  gmoney-analyst:
    path: skills/gmoney/gmoney-analyst
    profile: skills/gmoney/gmoney-analyst/profile.yaml
    role: research
  gmoney-quant:
    path: skills/gmoney/gmoney-quant
    profile: skills/gmoney/gmoney-quant/profile.yaml
    role: research
  gmoney-macro:
    path: skills/gmoney/gmoney-macro
    profile: skills/gmoney/gmoney-macro/profile.yaml
    role: research
  gmoney-pm:
    path: skills/gmoney/gmoney-pm
    profile: skills/gmoney/gmoney-pm/profile.yaml
    role: synthesis
  gmoney-risk:
    path: skills/gmoney/gmoney-risk
    profile: skills/gmoney/gmoney-risk/profile.yaml
    role: critique

# Install hints. The Railway template puts the Hermes config at
# /data/.hermes/config.yaml; a local CLI install uses ~/.hermes/config.yaml.
# Override either with the --config flag to scripts/install.py.
install:
  default_config_paths:
    - /data/.hermes/config.yaml    # Railway template (template repo: praveen-ks-2001/hermes-agent-template)
    - ~/.hermes/config.yaml        # Local CLI install
  external_dirs_key: skills.external_dirs
